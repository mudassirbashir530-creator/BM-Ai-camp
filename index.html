<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      (function() {
        try {
          var originalFetch = window.fetch;
          if (originalFetch) {
            var currentFetch = originalFetch;
            Object.defineProperty(window, 'fetch', {
              configurable: true,
              enumerable: true,
              get: function() {
                return currentFetch;
              },
              set: function(val) {
                console.warn('Attempt to set window.fetch intercepted and handled safely.');
                currentFetch = val || originalFetch;
              }
            });
          }
        } catch (e) {
          console.warn('Failed to define fetch override protection:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
