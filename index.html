    <script>
      (function() {
        try {
          var originalFetch = window.fetch;
          if (originalFetch) {
            var currentFetch = originalFetch;
            Object.defineProperty(window, 'fetch', {
              configurable: true,
              enumerable: true,
              get: function() {
                return currentFetch;
              },
              set: function(val) {
                console.warn('Attempt to set window.fetch intercepted and handled safely.');
                currentFetch = val || originalFetch;
              }
            });
          }
        } catch (e) {
          console.warn('Failed to define fetch override protection:', e);
        }
      })();
    </script>
